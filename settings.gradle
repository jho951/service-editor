pluginManagement {
    plugins {
        id 'org.springframework.boot' version settings.providers.gradleProperty('springBootVersion').get()
        id 'io.spring.dependency-management' version settings.providers.gradleProperty('springDependencyManagementVersion').get()
    }
}

rootProject.name = 'demo'

include 'documents-boot'
include 'documents-api'
include 'documents-core'
include 'documents-infrastructure'
