plugins {
    id 'org.springframework.boot' version '3.4.10' apply false
    id 'io.spring.dependency-management' version '1.1.6' apply false
}

ext {
    springBootVersion = '3.4.10'
    runtimeEnvKeys = [
        'DB_URL',
        'DB_USERNAME',
        'DB_PASSWORD',
        'SPRING_PROFILES_ACTIVE',
        'JWT_SECRET',
        'JWT_ACCESS_EXP',
        'JWT_REFRESH_EXP',
        'SWAGGER_ENABLED',
        'CORS_ENABLED',
        'CORS_ALLOWED_ORIGINS',
        'SERVER_PORT',
        'TZ'
    ]
}

group = 'com.example'
version = '0.0.1-SNAPSHOT'
description = 'Documents App (Spring Boot + JPA + MySQL + Swagger)'

allprojects {
    group = rootProject.group
    version = rootProject.version

    repositories {
        mavenCentral()
    }
}

subprojects {
    apply plugin: 'java-library'
    apply plugin: 'io.spring.dependency-management'

    dependencyManagement {
        imports {
            mavenBom "org.springframework.boot:spring-boot-dependencies:${springBootVersion}"
        }
    }

    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(17)
        }
    }

    dependencies {
        compileOnly 'org.projectlombok:lombok'
        annotationProcessor 'org.projectlombok:lombok'
        testCompileOnly 'org.projectlombok:lombok'
        testAnnotationProcessor 'org.projectlombok:lombok'
        testImplementation 'org.junit.jupiter:junit-jupiter'
    }

    tasks.named('test') {
        useJUnitPlatform()
    }

    def runtimeEnv = rootProject.ext.runtimeEnvKeys
        .findAll { rootProject.hasProperty(it) }
        .collectEntries { [(it): rootProject.property(it).toString()] }

    tasks.withType(Test).configureEach {
        if (!runtimeEnv.isEmpty()) {
            environment runtimeEnv
        }
        if (runtimeEnv.containsKey('TZ')) {
            systemProperty 'user.timezone', runtimeEnv['TZ']
        }
    }

    tasks.withType(JavaExec).configureEach {
        if (!runtimeEnv.isEmpty()) {
            environment runtimeEnv
        }
        if (runtimeEnv.containsKey('TZ')) {
            systemProperty 'user.timezone', runtimeEnv['TZ']
        }
    }
}
