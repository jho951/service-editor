name: CD

on:
  push:
    branches:
      - main
      - master
      - dev
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: Deployment environment.
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev

permissions:
  contents: read
  packages: read
  id-token: write

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CONTRACT_REPO: https://github.com/jho951/service-contract
  SERVICE_NAME: editor-service
  CD_PROFILE: ecs-blue-green
  DEFAULT_ECS_CONTAINER_NAME: editor-service
  DEFAULT_ECS_CONTAINER_PORT: "8083"
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
  HEALTH_URL: ${{ vars.HEALTH_URL || '' }}
  READY_URL: ${{ vars.READY_URL || '' }}
  IMAGE_BUILD_COMMAND: |
    DOCKER_BUILDKIT=1 docker build \
      --secret id=gh_token,env=GH_TOKEN \
      --secret id=github_actor,env=GITHUB_ACTOR \
      -f docker/Dockerfile \
      -t "${IMAGE_URI}" \
      .
    docker push "${IMAGE_URI}"
    if [ "${PUBLISH_LATEST}" = "true" ]; then
      docker tag "${IMAGE_URI}" "${LATEST_IMAGE_URI}"
      docker push "${LATEST_IMAGE_URI}"
    fi
  COMPOSE_CONFIG_COMMAND: |
    docker compose -f docker/dev/compose.yml config >/tmp/editor-dev.yml
    EDITOR_SERVICE_IMAGE=123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/prod-editor-service:test JWT_SECRET=ci-secret PLATFORM_SECURITY_JWT_SECRET=ci-platform-secret EDITOR_SERVICE_HOST_BIND=127.0.0.1 docker compose -f docker/prod/compose.yml config >/tmp/editor-prod.yml
  GITHUB_ACTOR: ${{ github.actor }}
  GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GH_TOKEN || secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN || github.token }}

jobs:
  deploy-gate:
    name: Deploy Gate
    runs-on: ubuntu-latest
    outputs:
      deploy_environment: ${{ steps.target.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate contract lock
        shell: bash
        run: |
          set -euo pipefail
          test -f contract.lock.yml
          grep -q "repo: ${CONTRACT_REPO}" contract.lock.yml
          grep -q "name: ${SERVICE_NAME}" contract.lock.yml
          grep -q "cd:" contract.lock.yml
          grep -q "profile: ${CD_PROFILE}" contract.lock.yml

      - name: Resolve target environment
        id: target
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target="${{ inputs.deploy_environment }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            target="prod"
          else
            target="dev"
          fi
          if [ "$target" = "prod" ] && [ "${{ github.ref_name }}" != "main" ] && [ "${{ github.ref_name }}" != "master" ] && [ "${{ github.ref_type }}" != "tag" ]; then
            echo "Production deploy requires main/master branch or a tag."
            exit 1
          fi
          echo "environment=$target" >> "$GITHUB_OUTPUT"

  image:
    name: Image
    runs-on: ubuntu-latest
    needs: deploy-gate
    outputs:
      image_uri: ${{ steps.resolve.outputs.image_uri }}
      latest_image_uri: ${{ steps.resolve.outputs.latest_image_uri }}
      repository: ${{ steps.resolve.outputs.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image target
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          repo="${ECR_REPOSITORY_NAME:-${{ needs.deploy-gate.outputs.deploy_environment }}-${SERVICE_NAME}}"
          image_uri="${{ steps.login-ecr.outputs.registry }}/${repo}:${GITHUB_SHA}"
          latest_image_uri="${{ steps.login-ecr.outputs.registry }}/${repo}:latest"
          echo "repository=$repo" >> "$GITHUB_OUTPUT"
          echo "image_uri=$image_uri" >> "$GITHUB_OUTPUT"
          echo "latest_image_uri=$latest_image_uri" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        shell: bash
        env:
          IMAGE_URI: ${{ steps.resolve.outputs.image_uri }}
          LATEST_IMAGE_URI: ${{ steps.resolve.outputs.latest_image_uri }}
          PUBLISH_LATEST: ${{ github.ref_name == 'main' || github.ref_name == 'master' }}
        run: |
          set -euo pipefail
          ${{ env.IMAGE_BUILD_COMMAND }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - deploy-gate
      - image
    environment: ${{ needs.deploy-gate.outputs.deploy_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Validate Compose config
        shell: bash
        run: ${{ env.COMPOSE_CONFIG_COMMAND }}

      - name: Resolve deployment metadata
        id: deploy-vars
        shell: bash
        env:
          DEPLOY_ENVIRONMENT: ${{ needs.deploy-gate.outputs.deploy_environment }}
        run: |
          set -euo pipefail
          echo "cluster_name=${ECS_CLUSTER_NAME:-${DEPLOY_ENVIRONMENT}-${SERVICE_NAME}-cluster}" >> "$GITHUB_OUTPUT"
          echo "service_name=${ECS_SERVICE_NAME:-${DEPLOY_ENVIRONMENT}-${SERVICE_NAME}}" >> "$GITHUB_OUTPUT"
          echo "application_name=${CODEDEPLOY_APPLICATION_NAME:-${DEPLOY_ENVIRONMENT}-${SERVICE_NAME}-codedeploy}" >> "$GITHUB_OUTPUT"
          echo "deployment_group_name=${CODEDEPLOY_DEPLOYMENT_GROUP_NAME:-${DEPLOY_ENVIRONMENT}-${SERVICE_NAME}-blue-green}" >> "$GITHUB_OUTPUT"
          echo "container_name=${ECS_CONTAINER_NAME:-${DEFAULT_ECS_CONTAINER_NAME}}" >> "$GITHUB_OUTPUT"
          echo "container_port=${ECS_CONTAINER_PORT:-${DEFAULT_ECS_CONTAINER_PORT}}" >> "$GITHUB_OUTPUT"

      - name: Register new task definition revision
        id: taskdef
        shell: bash
        env:
          IMAGE_URI: ${{ needs.image.outputs.image_uri }}
        run: |
          set -euo pipefail
          current_task_definition="$(aws ecs describe-services \
            --cluster "${{ steps.deploy-vars.outputs.cluster_name }}" \
            --services "${{ steps.deploy-vars.outputs.service_name }}" \
            --query 'services[0].taskDefinition' \
            --output text)"

          aws ecs describe-task-definition \
            --task-definition "$current_task_definition" \
            --query 'taskDefinition' \
            --output json > taskdef.json

          jq 'del(
            .taskDefinitionArn,
            .requiresAttributes,
            .compatibilities,
            .revision,
            .status,
            .registeredAt,
            .registeredBy
          )' taskdef.json \
            | jq --arg IMAGE "$IMAGE_URI" --arg NAME "${{ steps.deploy-vars.outputs.container_name }}" '
                .containerDefinitions |= map(
                  if .name == $NAME then .image = $IMAGE else . end
                )
              ' > taskdef-rendered.json

          task_definition_arn="$(aws ecs register-task-definition \
            --cli-input-json file://taskdef-rendered.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"

          echo "task_definition_arn=$task_definition_arn" >> "$GITHUB_OUTPUT"

      - name: Create CodeDeploy deployment
        id: codedeploy
        shell: bash
        run: |
          set -euo pipefail
          appspec_content="$(jq -n \
            --arg task "${{ steps.taskdef.outputs.task_definition_arn }}" \
            --arg container "${{ steps.deploy-vars.outputs.container_name }}" \
            --argjson port "${{ steps.deploy-vars.outputs.container_port }}" \
            '{
              version: "0.0",
              Resources: [
                {
                  TargetService: {
                    Type: "AWS::ECS::Service",
                    Properties: {
                      TaskDefinition: $task,
                      LoadBalancerInfo: {
                        ContainerName: $container,
                        ContainerPort: $port
                      }
                    }
                  }
                }
              ]
            }')"

          jq -n \
            --arg app "${{ steps.deploy-vars.outputs.application_name }}" \
            --arg group "${{ steps.deploy-vars.outputs.deployment_group_name }}" \
            --arg content "$appspec_content" \
            '{
              applicationName: $app,
              deploymentGroupName: $group,
              revision: {
                revisionType: "AppSpecContent",
                appSpecContent: {
                  content: $content
                }
              }
            }' > deployment-input.json

          deployment_id="$(aws deploy create-deployment \
            --cli-input-json file://deployment-input.json \
            --query 'deploymentId' \
            --output text)"

          echo "deployment_id=$deployment_id" >> "$GITHUB_OUTPUT"

      - name: Wait for CodeDeploy deployment
        shell: bash
        run: |
          set -euo pipefail
          aws deploy wait deployment-successful --deployment-id "${{ steps.codedeploy.outputs.deployment_id }}"

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Health check
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${HEALTH_URL}" ]; then
            echo "HEALTH_URL is not configured; CodeDeploy success is used as the deployment health gate."
            exit 0
          fi
          curl --fail --retry 12 --retry-delay 5 "${HEALTH_URL}"

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: health-check
    steps:
      - name: Smoke test
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${READY_URL}" ]; then
            echo "READY_URL is not configured; skipping smoke test."
            exit 0
          fi
          curl --fail --retry 12 --retry-delay 5 "${READY_URL}"
