db:
  url: jdbc:mysql://localhost:3306/documentsdb?useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Seoul
  username: root
  password: password
  pool:
    max: 10
    min: 2
    timeout-ms: 30000

spring:
  datasource:
    url: ${db.url}
    username: ${db.username}
    password: ${db.password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${db.pool.max}
      minimum-idle: ${db.pool.min}
      connection-timeout: ${db.pool.timeout-ms}
      pool-name: HikariDocuments
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul
