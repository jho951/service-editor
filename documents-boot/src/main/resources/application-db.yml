db:
  url: jdbc:mysql://localhost:3306/documentsdb?useSSL=false&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Seoul
  username: documents
  password: documents
  pool:
    max: 10
    min: 2
    timeout-ms: 30000

spring:
  datasource:
    url: ${db.url}
    username: ${db.username}
    password: ${db.password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${db.pool.max}
      minimum-idle: ${db.pool.min}
      connection-timeout: ${db.pool.timeout-ms}
      pool-name: HikariDocuments
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        type:
          preferred_uuid_jdbc_type: CHAR
        jdbc:
          time_zone: Asia/Seoul
