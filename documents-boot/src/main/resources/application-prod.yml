server:
  port: ${SERVER_PORT:8083}

db:
  url: ${DB_URL_PROD:${DB_URL}}
  username: ${DB_USERNAME_PROD:${DB_USERNAME}}
  password: ${DB_PASSWORD_PROD:${DB_PASSWORD}}
  pool:
    max: ${DB_POOL_MAX:30}
    min: ${DB_POOL_MIN:5}
    timeout-ms: ${DB_POOL_TIMEOUT_MS:30000}

spring:
  main:
    banner-mode: "off"
  jpa:
    hibernate:
      ddl-auto: none

logging:
  level:
    root: INFO
    com.documents: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}

auth:
  cors:
    enabled: ${CORS_ENABLED:false}
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
    allowed-methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
    allowed-headers: ["*"]
    allow-credentials: true
  jwt:
    secret: ${JWT_SECRET}
    issuer: documents-app
    access-token-exp-seconds: ${JWT_ACCESS_EXP:3600}
    refresh-token-exp-seconds: ${JWT_REFRESH_EXP:1209600}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never

platform:
  governance:
    service-role-preset: ${PLATFORM_GOVERNANCE_SERVICE_ROLE_PRESET:RESOURCE_SERVICE}
    audit:
      service-name: ${PLATFORM_GOVERNANCE_AUDIT_SERVICE_NAME:documents-app}
      environment: ${PLATFORM_GOVERNANCE_AUDIT_ENVIRONMENT:prod}
    engine:
      strict: ${PLATFORM_GOVERNANCE_ENGINE_STRICT:true}
    violation:
      handler-failure-fatal: ${PLATFORM_GOVERNANCE_VIOLATION_HANDLER_FAILURE_FATAL:true}
    operational:
      require-policy-config-in-enforcing-mode: ${PLATFORM_GOVERNANCE_OPERATIONAL_REQUIRE_POLICY_CONFIG_IN_ENFORCING_MODE:false}
  security:
    service-role-preset: ${PLATFORM_SECURITY_SERVICE_ROLE_PRESET:API_SERVER}
    ip-guard:
      enabled: ${PLATFORM_SECURITY_IP_GUARD_ENABLED:true}
      trust-proxy: ${PLATFORM_SECURITY_IP_GUARD_TRUST_PROXY:true}
      admin:
        rules: ${PLATFORM_SECURITY_ADMIN_ALLOW_CIDRS:${PLATFORM_SECURITY_ADMIN_ALLOW_CIDR:10.0.0.0/8}}
      internal:
        rules: ${PLATFORM_SECURITY_INTERNAL_ALLOW_CIDRS:${PLATFORM_SECURITY_INTERNAL_ALLOW_CIDR:10.0.0.0/8}}
    rate-limit:
      enabled: ${PLATFORM_SECURITY_RATE_LIMIT_ENABLED:true}
  resource:
    mode: ${PLATFORM_RESOURCE_MODE:production}
    operational:
      require-kind-policies-in-production: true
    jdbc:
      initialize-schema: ${PLATFORM_RESOURCE_JDBC_INITIALIZE_SCHEMA:false}
      catalog-table: ${PLATFORM_RESOURCE_JDBC_CATALOG_TABLE:platform_resource_catalog}
      outbox-table: ${PLATFORM_RESOURCE_JDBC_OUTBOX_TABLE:platform_resource_outbox}
    kinds:
      document-snapshot:
        allowed-content-types: [application/json]
        max-size: ${PLATFORM_RESOURCE_DOCUMENT_SNAPSHOT_MAX_SIZE:${PLATFORM_RESOURCE_DOCUMENT_MAX_SIZE:5MB}}
        access-mode: OWNER_OR_ADMIN
        delete-mode: SOFT
        notification-mode: OUTBOX
      editor-attachment:
        allowed-content-types: [image/png, image/jpeg, image/webp, application/pdf]
        max-size: ${PLATFORM_RESOURCE_ATTACHMENT_MAX_SIZE:20MB}
        access-mode: OWNER_OR_ADMIN
        delete-mode: SOFT
        notification-mode: OUTBOX
    storage:
      root-directory: ${DOCUMENTS_RESOURCE_STORAGE_ROOT:/var/lib/documents/resources}

documents:
  resource:
    purge-grace-period: ${DOCUMENTS_RESOURCE_PURGE_GRACE_PERIOD:PT24H}
    purge:
      fixed-delay-ms: ${DOCUMENTS_RESOURCE_PURGE_FIXED_DELAY_MS:60000}
    reconcile:
      fixed-delay-ms: ${DOCUMENTS_RESOURCE_RECONCILE_FIXED_DELAY_MS:3600000}
