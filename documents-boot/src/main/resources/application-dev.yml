db:
  url: ${DB_URL:jdbc:mysql://localhost:3306/drawingdb?useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Seoul}
  username: ${DB_USERNAME:root}
  password: ${DB_PASSWORD:password}

logging:
  level:
    com.documents: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

auth:
  cors:
    enabled: true
    allowed-origins:
      - "http://localhost:3000"
