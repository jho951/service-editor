db:
  url: ${DB_URL:jdbc:mysql://localhost:3306/documentsdb?useSSL=false&allowPublicKeyRetrieval=true&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Seoul}
  username: ${DB_USERNAME:documents}
  password: ${DB_PASSWORD:documents}

spring:
  jpa:
    hibernate:
      ddl-auto: update

logging:
  level:
    com.documents: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

auth:
  cors:
    enabled: true
    allowed-origins:
      - "http://localhost:3000"
