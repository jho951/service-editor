auth:
  jwt:
    secret: ${JWT_SECRET:change-this-in-prod}
    issuer: documents-app
    access-token-exp-seconds: 3600
    refresh-token-exp-seconds: 1209600
  service-token:
    bearer-token: ${AUTH_SERVICE_BEARER_TOKEN:}
  cors:
    enabled: true
    allowed-origins:
      - "http://localhost:3000"
    allowed-methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
    allowed-headers: ["*"]
    allow-credentials: true
