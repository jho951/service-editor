name: editor-service-dev

services:
  mysql:
    image: mysql:8.0
    container_name: editor-mysql-dev
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD_DEV:-root}
      MYSQL_DATABASE: ${DB_NAME_DEV:-documentsdb}
      MYSQL_USER: ${DB_USERNAME_DEV:-documents}
      MYSQL_PASSWORD: ${DB_PASSWORD_DEV:-documents}
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - mysql_data_dev:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${MYSQL_ROOT_PASSWORD_DEV:-root}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - documents-private

  editor-service:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      secrets:
        - gh_token
        - github_actor
    container_name: editor-app-dev
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: ${SERVER_PORT:-8083}
      DB_URL_DEV: ${DB_URL_DEV:-jdbc:mysql://mysql:3306/${DB_NAME_DEV:-documentsdb}?useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Seoul}
      DB_USERNAME_DEV: ${DB_USERNAME_DEV:-documents}
      DB_PASSWORD_DEV: ${DB_PASSWORD_DEV:-documents}
      JWT_SECRET: ${JWT_SECRET:-dev_secret}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=75 -XX:InitialRAMPercentage=50}
    env_file:
      - path: ../../.env.dev
        required: false
      - path: ../../.env
        required: false
    restart: always
    networks:
      documents-private: {}
      service-shared:
        aliases:
          - documents-service
          - editor-service

volumes:
  mysql_data_dev:

secrets:
  gh_token:
    environment: GH_TOKEN
  github_actor:
    environment: GITHUB_ACTOR

networks:
  documents-private:
    driver: bridge
    internal: true
  service-shared:
    external: true
    name: ${SERVICE_SHARED_NETWORK:-service-backbone-shared}
